<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Solutions — Типы данных и структуры</title>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap");

        :root {
            --bg: #0b1020;
            --surface: #11172a;
            --card: #161d34;
            --border: #2a355a;
            --text: #e5ecff;
            --muted: #94a3c4;
            --accent: #5eead4;
            --accent2: #60a5fa;
            --accent3: #f59e0b;
            --accent4: #22c55e;
            --accent5: #ef4444;
            --accent6: #a78bfa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Inter, sans-serif;
            background: radial-gradient(circle at top left, rgba(96, 165, 250, 0.12), transparent 30%), radial-gradient(circle at bottom right, rgba(94, 234, 212, 0.1), transparent 25%), var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        header {
            padding: 64px 0 36px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: #061018;
            margin-bottom: 18px;
        }

        h1 {
            font-size: clamp(2.4rem, 6vw, 5rem);
            line-height: 1.05;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1.05rem;
            max-width: 760px;
            margin: 0 auto 34px;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .stat-chip {
            background: rgba(22, 29, 52, 0.9);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            display: flex;
            gap: 10px;
            align-items: center;
            color: var(--muted);
            font-size: 0.92rem;
        }

            .stat-chip .num {
                color: var(--accent);
                font-size: 1.35rem;
                font-weight: 800;
            }

        .progress-wrap {
            background: rgba(22, 29, 52, 0.9);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 22px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .progress-label {
            font-weight: 700;
            white-space: nowrap;
        }

        .progress-bar {
            flex: 1;
            min-width: 220px;
            height: 10px;
            background: #0e1425;
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: width 0.35s ease;
        }

        .progress-count {
            font-family: "JetBrains Mono", monospace;
            color: var(--accent);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

            .btn-reset:hover {
                color: white;
                border-color: var(--accent5);
            }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(22, 29, 52, 0.9);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 22px;
            backdrop-filter: blur(10px);
        }

        .search-wrap {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

            .search-wrap input {
                width: 100%;
                padding: 12px 14px 12px 42px;
                border-radius: 12px;
                background: #0e1425;
                border: 1px solid var(--border);
                color: var(--text);
                outline: none;
                font-size: 0.95rem;
            }

            .search-wrap::before {
                content: "🔎";
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 0.95rem;
            }

        .filter-btn {
            background: #0e1425;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

            .filter-btn:hover,
            .filter-btn.active {
                color: white;
                border-color: var(--accent2);
                background: rgba(96, 165, 250, 0.12);
            }

        .topic-section {
            margin-top: 34px;
        }

        .topic-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(11, 16, 32, 0.92);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .topic-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .topic-title {
            font-size: 1.32rem;
            font-weight: 800;
        }

        .topic-count {
            margin-left: auto;
            color: var(--muted);
            border: 1px solid var(--border);
            background: #0e1425;
            border-radius: 999px;
            padding: 5px 11px;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.8rem;
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 14px;
        }

        .task-card {
            background: rgba(22, 29, 52, 0.94);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
            position: relative;
            overflow: hidden;
        }

            .task-card::before {
                content: "";
                position: absolute;
                inset: 0 0 auto 0;
                height: 3px;
                background: linear-gradient(90deg, var(--card-color, var(--accent2)), transparent);
                opacity: 0;
                transition: opacity 0.18s;
            }

            .task-card:hover {
                transform: translateY(-3px);
                border-color: var(--card-color, var(--accent2));
                box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
            }

                .task-card:hover::before {
                    opacity: 1;
                }

            .task-card.done {
                border-color: rgba(34, 197, 94, 0.4);
                background: rgba(34, 197, 94, 0.08);
            }

                .task-card.done::before {
                    opacity: 1;
                    background: linear-gradient(90deg, var(--accent4), transparent);
                }

        .task-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .task-num {
            font-family: "JetBrains Mono", monospace;
            color: var(--muted);
            background: #0e1425;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 0.76rem;
        }

        .difficulty {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .diff-easy {
            background: rgba(34, 197, 94, 0.14);
            color: var(--accent4);
        }

        .diff-medium {
            background: rgba(245, 158, 11, 0.14);
            color: var(--accent3);
        }

        .diff-hard {
            background: rgba(239, 68, 68, 0.14);
            color: var(--accent5);
        }

        .task-text {
            font-size: 0.94rem;
            line-height: 1.65;
            color: var(--text);
            margin-bottom: 16px;
        }

            .task-text code {
                font-family: "JetBrains Mono", monospace;
                background: #0e1425;
                border: 1px solid var(--border);
                border-radius: 7px;
                padding: 2px 6px;
                color: var(--accent);
                font-size: 0.85em;
            }

            .task-text pre {
                background: #0e1425;
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 12px;
                margin: 10px 0 0;
                overflow-x: auto;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.8rem;
                line-height: 1.5;
                color: #a5b4fc;
            }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-done {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 9px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.18s;
        }

            .btn-done:hover {
                border-color: var(--accent4);
                color: var(--accent4);
            }

        .task-card.done .btn-done {
            color: var(--accent4);
            border-color: var(--accent4);
            background: rgba(34, 197, 94, 0.08);
        }

        .hidden {
            display: none !important;
        }

        .float-counter {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: #041018;
            padding: 14px 18px;
            border-radius: 18px;
            font-weight: 900;
            box-shadow: 0 16px 40px rgba(96, 165, 250, 0.35);
            z-index: 100;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 999px;
        }

        @media (max-width: 680px) {
            .task-grid {
                grid-template-columns: 1fr;
            }

            .float-counter {
                right: 12px;
                bottom: 12px;
                padding: 10px 14px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="badge">✦ JavaScript Solutions</div>
            <h1>200 решений<br />по структурам данных</h1>
            <p class="subtitle">
                Типы данных · примитивы · числа · строки · массивы · Map/Set · Date · JSON
            </p>
            <div class="stats">
                <div class="stat-chip"><span class="num">200</span> решений</div>
                <div class="stat-chip"><span class="num">13</span> тем</div>
                <div class="stat-chip"><span class="num" id="easyCount">0</span> лёгких</div>
                <div class="stat-chip"><span class="num" id="medCount">0</span> средних</div>
                <div class="stat-chip"><span class="num" id="hardCount">0</span> сложных</div>
            </div>
        </header>

        <div class="progress-wrap">
            <span class="progress-label">⚡ Прогресс</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <span class="progress-count" id="progressText">0 / 200</span>
            <button class="btn-reset" onclick="resetAll()">Сбросить</button>
        </div>

        <div class="toolbar">
            <div class="search-wrap">
                <input type="text"
                       id="searchInput"
                       placeholder="Поиск решения..."
                       oninput="filterTasks()" />
            </div>
            <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
            <button class="filter-btn" onclick="setFilter('easy', this)">Лёгкие</button>
            <button class="filter-btn" onclick="setFilter('medium', this)">Средние</button>
            <button class="filter-btn" onclick="setFilter('hard', this)">Сложные</button>
            <button class="filter-btn" onclick="setFilter('done', this)">Выполненные</button>
            <button class="filter-btn" onclick="setFilter('undone', this)">Невыполненные</button>
        </div>

        <div id="tasksRoot"></div>
    </div>

    <div class="float-counter" id="floatCounter">✅ 0 / 200</div>

    <script>
    const TOPICS = [
      {
        id: "types",
        title: "Типы данных",
        icon: "🧩",
        color: "#60a5fa",
        tasks: [
          { d: "easy",   t: '<strong>Ответ:</strong> Примитивные типы: <code>string</code>, <code>number</code>, <code>bigint</code>, <code>boolean</code>, <code>undefined</code>, <code>symbol</code>, <code>null</code>.' },
          { d: "easy",   t: '<strong>Ответ:</strong> Примитивы неизменяемы, передаются по значению, объекты — по ссылке, изменяемы.' },
          { d: "easy",   t: '<strong>Ответ:</strong> <code>typeof 42</code> → <code>"number"</code>, <code>typeof "hi"</code> → <code>"string"</code>, <code>typeof true</code> → <code>"boolean"</code>.' },
          { d: "easy",   t: '<strong>Ответ:</strong> <code>typeof undefined</code> → <code>"undefined"</code>, <code>typeof null</code> → <code>"object"</code> (историческая ошибка).' },
          { d: "easy",   t: '<strong>Ответ:</strong> <code>typeof []</code> → <code>"object"</code>, <code>typeof {}</code> → <code>"object"</code>, <code>typeof Symbol("id")</code> → <code>"symbol"</code>, <code>typeof 10n</code> → <code>"bigint"</code>.' },
          { d: "easy",   t: '<strong>Решение:</strong><br><pre><code>function getType(value) {\n  if (value === null) return "null";\n  return typeof value;\n}\n\nconsole.log(getType(null));     // "null"\nconsole.log(getType({}));       // "object"</code></pre>' },
          { d: "easy",   t: '<strong>Ответ:</strong> <code>BigInt</code> — тип для целых чисел любой длины.<br><strong>Пример:</strong><br><pre><code>const big = 12345678901234567890n;\nconsole.log(big + 1n);</code></pre>' },
          { d: "medium", t: '<strong>Решение:</strong><br><pre><code>function checkType(value) {\n  if (Array.isArray(value)) return "array";\n  if (value === null) return "null";\n  if (typeof value === "function") return "function";\n  if (value && typeof value === "object") return "object";\n  return "primitive";\n}</code></pre>' },
          { d: "medium", t: '<strong>Ответ:</strong> <code>typeof</code> — общий тип, <code>instanceof</code> — проверка по прототипу.<br><pre><code>console.log(typeof []);          // "object"\nconsole.log([] instanceof Array); // true</code></pre>' },
          { d: "medium", t: '<strong>Решение:</strong><br><pre><code>function getReadableType(v) {\n  if (v === null) return "null";\n  if (Array.isArray(v)) return "массив";\n  if (typeof v === "function") return "функция";\n  return typeof v;\n}</code></pre>' },
          { d: "medium", t: '<strong>Ответ:</strong> falsy: <code>false, 0, "", null, undefined, NaN</code><br>truthy: всё остальное<br><pre><code>console.log(!![]);   // true\nconsole.log(!!{});   // true\nconsole.log(!!"0");  // true</code></pre>' },
          { d: "medium", t: '<strong>Ответ:</strong> Функция — объект, можно добавлять свойства.<br><pre><code>function f() {}\nf.version = "1.0";\nconsole.log(f.version); // "1.0"</code></pre>' },
          { d: "hard",   t: '<strong>Решение:</strong><br><pre><code>function isPlainObject(v) {\n  return v !== null &&\n         typeof v === "object" &&\n         Object.getPrototypeOf(v) === Object.prototype;\n}</code></pre>' },
          { d: "hard",   t: '<strong>Ответ:</strong> Сравнение методов определения типа<br><pre><code>console.log(typeof []);                    // "object"\nconsole.log({}.toString.call([]));        // "[object Array]"\nconsole.log(Array.isArray([]));           // true</code></pre>' },
          { d: "hard",   t: '<strong>Решение:</strong><br><pre><code>function typeStats(arr) {\n  return arr.reduce((acc, v) => {\n    const t = v === null ? "null" : typeof v;\n    acc[t] = (acc[t] || 0) + 1;\n    return acc;\n  }, {});\n}</code></pre>' }
        ]
      },
        {
            id: "primitive_methods",
            title: "Методы примитивов",
            icon: "✨",
            color: "#5eead4",
            tasks: [
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> Примитивы временно оборачиваются в объекты-обёртки (<code>String</code>, <code>Number</code>, <code>Boolean</code>) при вызове методов.',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>"hello".toUpperCase()</code> → <code>"HELLO"</code>. Под капотом: <code>new String("hello").toUpperCase()</code>.',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>(123.456).toFixed(2)</code> → <code>"123.46"</code>.',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>true.toString()</code> → <code>"true"</code>.',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> У <code>null</code> и <code>undefined</code> нет методов и свойств.',
                },
                {
                    d: "medium",
                    t: '<strong>Решение:</strong><br><pre><code>const str = "abc";\nconst upper = str.toUpperCase(); // "ABC"</code></pre>',
                },
                {
                    d: "medium",
                    t: '<strong>Ответ:</strong> <code>new String("abc")</code> — объект, <code>"abc"</code> — примитив. Пример: <code>typeof new String("abc")</code> → <code>"object"</code>.',
                },
                {
                    d: "medium",
                    t: '<strong>Ответ:</strong> <code>new Number(5) === 5</code> → <code>false</code>, <code>new Number(5) == 5</code> → <code>true</code>.',
                },
                {
                    d: "medium",
                    t: '<strong>Решение:</strong><br><pre><code>function callPrimitiveMethod(value, method) {\n  if (typeof value === "string") return value[method]();\n  if (typeof value === "number") return value[method]();\n  if (typeof value === "boolean") return value[method]();\n  return "Метод недоступен";\n}</code></pre>',
                },
                {
                    d: "hard",
                    t: '<strong>Ответ:</strong> Строка — примитив, свойства нельзя добавить навсегда. Пример: <code>"abc".x = 10; console.log("abc".x); // undefined</code>',
                },
                {
                    d: "hard",
                    t: '<strong>Ответ:</strong> Объекты-обёртки создают лишние объекты, что замедляет код и усложняет сравнения.',
                },
                {
                    d: "hard",
                    t: '<strong>Решение:</strong><br><pre><code>// При вызове метода у примитива создаётся временный объект-обёртка,\n// после вызова метода объект уничтожается, а примитив остаётся.</code></pre>',
                },
            ],
        },
        {
            id: "numbers",
            title: "Числа",
            icon: "🔢",
            color: "#f59e0b",
            tasks: [
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>number</code> — 64-битное число с плавающей точкой (IEEE 754).',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>0.1 + 0.2</code> → <code>0.30000000000000004</code> (особенность двоичной арифметики).',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>parseInt</code> — целое число, <code>parseFloat</code> — дробное.',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>Number("123")</code> → <code>123</code>, <code>Number("123px")</code> → <code>NaN</code>.',
                },
                {
                    d: "easy",
                    t: '<strong>Решение:</strong><br><pre><code>Math.round(3.6) // 4\nMath.floor(3.6) // 3\nMath.ceil(3.6) // 4</code></pre>',
                },
                {
                    d: "easy",
                    t: '<strong>Решение:</strong><br><pre><code>Math.floor(Math.random() * 10) + 1</code></pre>',
                },
                {
                    d: "easy",
                    t: '<strong>Ответ:</strong> <code>NaN</code> — Not a Number. Проверка: <code>Number.isNaN(NaN)</code> → <code>true</code>.',
                },
                {
                    d: "medium",
                    t: '<strong>Решение:</strong><br><pre><code>function isFiniteNumber(value) {\n  return typeof value === "number" && !isNaN(value) && isFinite(value);\n}</code></pre>',
                },
                {
                    d: "medium",
                    t: '<strong>Ответ:</strong> <code>isNaN()</code> пытается преобразовать значение, <code>Number.isNaN()</code> — строгая проверка.',
                },
                {
                    d: "medium",
                    t: '<strong>Решение:</strong><br><pre><code>function roundToTwo(num) {\n  return Math.round(num * 100) / 100;\n}</code></pre>',
                },
                {
                    d: "medium",
                    t: '<strong>Решение:</strong><br><pre><code>(10).toString(2) // "1010"</code></pre>',
                },
                {
                    d: "medium",
                    t: '<strong>Ответ:</strong> <code>Infinity</code> — бесконечность. Пример: <code>1 / 0</code> → <code>Infinity</code>.',
                },
                {
                    d: "medium",
                    t: '<strong>Решение:</strong><br><pre><code>function sumDigits(n) {\n  return String(n).split("").reduce((a, b) => a + +b, 0);\n}</code></pre>',
                },
                {
                    d: "hard",
                    t: '<strong>Ответ:</strong> <code>9007199254740991</code> — максимальное целое число, точно представимое в <code>number</code>.',
                },
                {
                    d: "hard",
                    t: '<strong>Решение:</strong><br><pre><code>const big = 123n + 456n; // 579n\n// Нельзя: 123n + 456 // TypeError</code></pre>',
                },

    const STORAGE_KEY = "jsSolutions_done";
    let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let currentFilter = "all";
    let searchQuery = "";
    const TOTAL = TOPICS.reduce((sum, t) => sum + t.tasks.length, 0);

    function renderAll() {
      const root = document.getElementById("tasksRoot");
      root.innerHTML = "";

      let easy = 0, medium = 0, hard = 0;
      TOPICS.forEach(topic =>
        topic.tasks.forEach(task => {
          if (task.d === "easy") easy++;
          if (task.d === "medium") medium++;
          if (task.d === "hard") hard++;
        })
      );

      document.getElementById("easyCount").textContent = easy;
      document.getElementById("medCount").textContent = medium;
      document.getElementById("hardCount").textContent = hard;

      let taskNumber = 0;

      TOPICS.forEach(topic => {
        const section = document.createElement("section");
        section.className = "topic-section";

        const header = document.createElement("div");
        header.className = "topic-header";
        header.innerHTML = `
          <div class="topic-icon" style="background:${topic.color}22; color:${topic.color}">
            ${topic.icon}
          </div>
          <div class="topic-title">${topic.title}</div>
          <div class="topic-count">${topic.tasks.length} решений</div>
        `;

        section.appendChild(header);

        const grid = document.createElement("div");
        grid.className = "task-grid";

        topic.tasks.forEach((task, idx) => {
          taskNumber++;
          const id = `${topic.id}_${idx}`;
          const isDone = !!done[id];

          const labels = { easy: "Лёгкое", medium: "Среднее", hard: "Сложное" };
          const diffClasses = { easy: "diff-easy", medium: "diff-medium", hard: "diff-hard" };

          const card = document.createElement("div");
          card.className = `task-card${isDone ? " done" : ""}`;
          card.style.setProperty("--card-color", topic.color);

          card.dataset.id   = id;
          card.dataset.diff = task.d;
          card.dataset.done = isDone ? "1" : "0";
          card.dataset.text = task.t.replace(/<[^>]+>/g, "").toLowerCase();

          card.innerHTML = `
            <div class="task-top">
              <span class="task-num">#${String(taskNumber).padStart(3, "0")}</span>
              <span class="difficulty ${diffClasses[task.d]}">${labels[task.d]}</span>
            </div>
            <div class="task-text">${task.t}</div>
            <div class="task-actions">
              <button class="btn-done" onclick="toggleDone('${id}', this)">
                ${isDone ? "✅ Сделано" : "○ Выполнено"}
              </button>
            </div>
          `;

          grid.appendChild(card);
        });

        section.appendChild(grid);
        root.appendChild(section);
      });

      updateProgress();
      applyFilter();
    }

    function toggleDone(id, btn) {
      done[id] = !done[id];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));

      const card = btn.closest(".task-card");
      const isDone = !!done[id];

      card.classList.toggle("done", isDone);
      card.dataset.done = isDone ? "1" : "0";
      btn.textContent = isDone ? "✅ Сделано" : "○ Выполнено";

      updateProgress();
      applyFilter();
    }

    function updateProgress() {
      const completed = Object.values(done).filter(Boolean).length;
      const percent = ((completed / TOTAL) * 100).toFixed(1);

      document.getElementById("progressBar").style.width = percent + "%";
      document.getElementById("progressText").textContent = `${completed} / ${TOTAL}`;
      document.getElementById("floatCounter").textContent = `✅ ${completed} / ${TOTAL}`;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach(el => el.classList.remove("active"));
      btn.classList.add("active");
      applyFilter();
    }

    function filterTasks() {
      searchQuery = document.getElementById("searchInput").value.toLowerCase().trim();
      applyFilter();
    }

    function applyFilter() {
      document.querySelectorAll(".task-card").forEach(card => {
        const diff = card.dataset.diff;
        const isDone = card.dataset.done === "1";
        const text = card.dataset.text;
        let visible = true;

        if (currentFilter === "easy")   visible = diff === "easy";
        if (currentFilter === "medium") visible = diff === "medium";
        if (currentFilter === "hard")   visible = diff === "hard";
        if (currentFilter === "done")   visible = isDone;
        if (currentFilter === "undone") visible = !isDone;
        if (searchQuery && !text.includes(searchQuery)) visible = false;

        card.classList.toggle("hidden", !visible);
      });

      document.querySelectorAll(".topic-section").forEach(section => {
        const hasVisible = [...section.querySelectorAll(".task-card")]
          .some(card => !card.classList.contains("hidden"));
        section.classList.toggle("hidden", !hasVisible);
      });
    }

    function resetAll() {
      if (confirm("Сбросить весь прогресс?")) {
        done = {};
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
      }
    }

    renderAll();
    </script>
